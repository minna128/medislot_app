name: medislot
description: MediSlot - Clinic Appointment Booking App (Assignment 4)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Data / Storage (studied: saving data, reading JSON) ───────────────
  shared_preferences: ^2.2.3     # Save login state + user data locally
  sqflite: ^2.3.3                # Save appointments to local database
  path_provider: ^2.1.3          # Find correct file path on device
  path: ^1.9.0                   # Path utilities for SQLite

  # ── Networking (fetch external JSON) ──────────────────────────────────
  http: ^1.2.1                   # HTTP requests to external API / JSON file
  connectivity_plus: ^6.0.3      # Network connectivity sensor

  # ── Sensors (studied: sensors in Android) ─────────────────────────────
  geolocator: ^11.0.0            # GPS sensor
  sensors_plus: ^4.0.2           # Accelerometer sensor
  image_picker: ^1.1.2           # Camera sensor
  permission_handler: ^11.3.1    # Request permissions at runtime

  # ── Images ────────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1   # Load & cache doctor profile photos

  # ── UI Utilities ──────────────────────────────────────────────────────
  intl: ^0.19.0                  # Date formatting
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/              # Local JSON files
    - assets/images/            # Hero banner, logo, illustrations

